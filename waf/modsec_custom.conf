# Turn the inspection engine ON
SecRuleEngine On

# Block incoming traffic if source IP matches our export list
SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity/shared/ip_blocklist.txt" \
    "id:1000001,\
    phase:1,\
    deny,\
    status:403,\
    msg:'Access denied: IP matches ThreatFox CTI high-confidence indicator'"